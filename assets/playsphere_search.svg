<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="playButtonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63ff6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="magnifyingGlassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63ff6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Floating particles/dots -->
  <circle cx="80" cy="80" r="2" fill="#63ff6b" opacity="0.6"/>
  <circle cx="320" cy="120" r="1.5" fill="#4ade80" opacity="0.7"/>
  <circle cx="350" cy="280" r="2.5" fill="#22c55e" opacity="0.5"/>
  <circle cx="60" cy="320" r="1.8" fill="#63ff6b" opacity="0.6"/>
  <circle cx="340" cy="320" r="1.2" fill="#4ade80" opacity="0.4"/>
  <circle cx="40" cy="200" r="1.6" fill="#22c55e" opacity="0.5"/>
  
  <!-- Search wave effects -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="#63ff6b" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.1"/>
  
  <!-- Main magnifying glass -->
  <g transform="translate(200,200)">
    <!-- Magnifying glass lens outer glow -->
    <circle cx="-20" cy="-20" r="48" fill="none" stroke="#63ff6b" stroke-width="2" opacity="0.3"/>
    
    <!-- Magnifying glass lens -->
    <circle cx="-20" cy="-20" r="45" fill="none" stroke="url(#magnifyingGlassGradient)" stroke-width="7" filter="url(#glow)"/>
    
    <!-- Inner lens detail -->
    <circle cx="-20" cy="-20" r="35" fill="none" stroke="#63ff6b" stroke-width="2" opacity="0.5"/>
    <circle cx="-20" cy="-20" r="25" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
    
    <!-- Lens reflection -->
    <ellipse cx="-30" cy="-30" rx="8" ry="15" fill="#63ff6b" opacity="0.2" transform="rotate(-45 -30 -30)"/>
    
    <!-- Magnifying glass handle -->
    <line x1="15" y1="15" x2="35" y2="35" stroke="url(#magnifyingGlassGradient)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Handle grip details -->
    <line x1="18" y1="18" x2="32" y2="32" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
    <line x1="21" y1="21" x2="29" y2="29" stroke="#63ff6b" stroke-width="1" opacity="0.8"/>
    
    <!-- Handle end cap -->
    <circle cx="35" cy="35" r="4" fill="#22c55e" opacity="0.8"/>
  </g>
  
  <!-- PlaySphere logo elements inside magnifying glass -->
  <g transform="translate(180,180)">
    <!-- Central play button glow -->
    <circle cx="0" cy="0" r="22" fill="#63ff6b" opacity="0.1"/>
    
    <!-- Central play button -->
    <circle cx="0" cy="0" r="19" fill="url(#playButtonGradient)" filter="url(#softGlow)"/>
    
    <!-- Play triangle -->
    <polygon points="-6,-8 -6,8 8,0" fill="#1a1a1a"/>
    
    <!-- Video content spheres in fixed positions -->
    <circle cx="0" cy="-30" r="4" fill="#63ff6b" opacity="0.8"/>
    <circle cx="21" cy="21" r="3" fill="#4ade80" opacity="0.9"/>
    <circle cx="-25" cy="15" r="3.5" fill="#22c55e" opacity="0.7"/>
    <circle cx="26" cy="-8" r="2.5" fill="#63ff6b" opacity="0.6"/>
    <circle cx="-15" cy="-25" r="2.8" fill="#4ade80" opacity="0.7"/>
    
    <!-- Connection lines between spheres -->
    <line x1="0" y1="-30" x2="0" y2="-19" stroke="#63ff6b" stroke-width="1" opacity="0.3"/>
    <line x1="21" y1="21" x2="15" y2="15" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
    <line x1="-25" y1="15" x2="-15" y2="12" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- User profile icons representing search results -->
  <g transform="translate(120,300)" opacity="0.8">
    <circle cx="0" cy="0" r="12" fill="#333" stroke="#63ff6b" stroke-width="2"/>
    <circle cx="0" cy="-3" r="4" fill="#63ff6b"/>
    <path d="M -8,8 A 8,8 0 0,1 8,8" fill="none" stroke="#63ff6b" stroke-width="2"/>
  </g>
  
  <g transform="translate(280,320)" opacity="0.7">
    <circle cx="0" cy="0" r="12" fill="#333" stroke="#4ade80" stroke-width="2"/>
    <circle cx="0" cy="-3" r="4" fill="#4ade80"/>
    <path d="M -8,8 A 8,8 0 0,1 8,8" fill="none" stroke="#4ade80" stroke-width="2"/>
  </g>
  
  <g transform="translate(90,120)" opacity="0.6">
    <circle cx="0" cy="0" r="12" fill="#333" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="-3" r="4" fill="#22c55e"/>
    <path d="M -8,8 A 8,8 0 0,1 8,8" fill="none" stroke="#22c55e" stroke-width="2"/>
  </g>
  
  <!-- Additional user icons for more populated feel -->
  <g transform="translate(310,180)" opacity="0.5">
    <circle cx="0" cy="0" r="10" fill="#333" stroke="#63ff6b" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="3" fill="#63ff6b"/>
    <path d="M -6,6 A 6,6 0 0,1 6,6" fill="none" stroke="#63ff6b" stroke-width="1.5"/>
  </g>
  
  <g transform="translate(70,250)" opacity="0.4">
    <circle cx="0" cy="0" r="10" fill="#333" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="3" fill="#4ade80"/>
    <path d="M -6,6 A 6,6 0 0,1 6,6" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  </g>
  
  <!-- Text highlight -->
  <text x="200" y="350" text-anchor="middle" fill="#63ff6b" font-family="Arial, sans-serif" font-size="16" font-weight="bold" opacity="0.9">
    Discover PlaySphere Users
  </text>
  
  <!-- Subtle connecting lines -->
  <line x1="120" y1="300" x2="180" y2="180" stroke="#63ff6b" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="320" x2="220" y2="180" stroke="#4ade80" stroke-width="1" opacity="0.25"/>
  <line x1="90" y1="120" x2="180" y2="180" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="180" x2="220" y2="180" stroke="#63ff6b" stroke-width="1" opacity="0.2"/>
  <line x1="70" y1="250" x2="160" y2="200" stroke="#4ade80" stroke-width="1" opacity="0.2"/>
</svg>
